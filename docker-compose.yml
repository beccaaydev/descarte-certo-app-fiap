version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: descarte-certo-oracle
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: descartecerto
      APP_USER_PASSWORD: oracle
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - descarte-certo-network
    healthcheck:
      test: [ "CMD-SHELL", "$$ORACLE_BASE/healthcheck.sh >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  descarte-certo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: descarte-certo-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: descartecerto
      SPRING_DATASOURCE_PASSWORD: oracle
      TZ: UTC
    ports:
      - "8081:8081"
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - descarte-certo-network
    restart: no

networks:
  descarte-certo-network:
    driver: bridge

volumes:
  oracle-data:

