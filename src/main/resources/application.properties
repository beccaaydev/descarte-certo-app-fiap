spring.application.name=descartecerto
server.port=8081

# Configuracao no banco de dados: Oracle
spring.datasource.url=jdbc:oracle:thin:@//oracle.fiap.com.br:1521/ORCL

# Atencao: Trocar user e password pela senha que voces usam no banco da FIAP.
# OBS: Nao commitar o usuario e senha de voces para o github.
spring.datasource.username= RM00000
spring.datasource.password= 000000
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# CONFIGURACAO DO JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.format_sql=true

# CONFIGURACAO DO FLYWAY (MIGRACOES)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
